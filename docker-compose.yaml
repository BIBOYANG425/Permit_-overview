services:
  nextjs-frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - AGENT_SERVICE_URL=http://agent-service:8080
      # OCR key still needed for /api/upload route (stays in Next.js)
      - NVIDIA_OCR_API_KEY=${NVIDIA_OCR_API_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/tools/county-config?id=la').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  agent-service:
    build: ./agent-service
    ports:
      - "8080:8080"
    environment:
      - TOOLS_BASE_URL=http://nextjs-frontend:3000/api/tools
      - NVIDIA_NIM_API_KEY_FAST=${NVIDIA_NIM_API_KEY_FAST}
      - NVIDIA_NIM_API_KEY_REASONING=${NVIDIA_NIM_API_KEY_REASONING}
    depends_on:
      nextjs-frontend:
        condition: service_healthy
